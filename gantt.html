<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Gantt System | Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        .gantt-viewport { overflow-x: auto; background: #1e293b; border-radius: 24px; border: 1px solid #334155; height: 650px; scroll-behavior: smooth; position: relative; }
        .row-height { min-height: 125px; border-bottom: 1px solid #334155; position: relative; display: flex; align-items: center; }
        
        .track-container { position: relative; flex-grow: 1; height: 95px; width: 100%; }
        
        /* Baseline Bianca dinamica */
        .baseline-ticket {
            position: absolute; height: 6px; background: rgba(255, 255, 255, 0.4);
            border-radius: 20px; top: 41px; z-index: 5; pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .seg-bar { 
            position: absolute; height: 26px; border-radius: 6px; z-index: 20; cursor: help;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
            padding: 0 10px; font-size: 9px; font-weight: 800; text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); white-space: nowrap; overflow: hidden;
        }

        .pos-0 { top: 4px; } .pos-1 { top: 31px; } .pos-2 { top: 58px; }

        .delay-fill {
            background: repeating-linear-gradient(45deg, #ef4444, #ef4444 12px, #991b1b 12px, #991b1b 24px);
            border: 1px solid #f87171; animation: pulse-red 2s infinite; z-index: 30;
        }

        @keyframes pulse-red { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        .ticket-delayed { border-right: 4px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05); }

        .st-nuovo { background: #3b82f6; } 
        .st-lavorazione { background: #f59e0b; }
        .st-risolto { background: #10b981; } 
        .st-verificato { background: #8b5cf6; }
        .st-accettato { background: #ec4899; } 
        .st-chiuso { background: #64748b; }

        .timeline-cell { min-width: 50px; text-align: center; font-size: 10px; color: #64748b; border-right: 1px solid #334155; padding: 14px 0; font-family: 'JetBrains Mono', monospace; }
        
        .sticky-col { 
            position: sticky; left: 0; z-index: 100; background: #1e293b; 
            border-right: 4px solid #3b82f6; min-width: 250px; max-width: 250px;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); 
        }
        
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 150; pointer-events: none; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 20px; min-height: 180px; }
    </style>
</head>
<body class="p-8">

<div class="max-w-[1900px] mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
        <div class="stat-card flex flex-col justify-center items-center border-l-8 border-red-600 shadow-xl">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">SLA Superati</h3>
            <span id="delay-count" class="text-6xl font-black text-white mt-2">0</span>
        </div>

        <div class="stat-card flex flex-col items-center justify-center">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Stato Avanzamento</h3>
            <div class="w-full h-32 relative">
                <canvas id="stateChart"></canvas>
            </div>
        </div>

        <div class="stat-card flex flex-col justify-center border-l-8 border-blue-600 shadow-xl px-10">
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">PROJECT <span class="text-blue-500">CONTROL HUB</span></h1>
            <div class="flex gap-3 mt-6">
                <button onclick="loadGantt()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-black transition-all text-[10px] uppercase shadow-lg">
                    <i class="fas fa-sync-alt mr-2"></i>Aggiorna
                </button>
                <button onclick="window.location.href='menu.html'" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-black transition-all text-[10px] uppercase shadow-lg">
                    <i class="fas fa-th mr-2"></i>Menu
                </button>
            </div>
        </div>
    </div>

    <div class="gantt-viewport shadow-2xl" id="viewport">
        <div id="timeline-header" class="flex bg-slate-800/95 backdrop-blur-md sticky top-0 z-[110]"></div>
        <div id="gantt-content" class="relative"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG1kbG9pY25mcXlpeGx4d2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDgyODEsImV4cCI6MjA4NzU4NDI4MX0.EyPcvKFabIL_BX67S0MKLm4ccvHFr4Fiq3glt_iSJWg';
    const client = supabase.createClient(SB_URL, SB_KEY);
    
    const DAY_PX = 50; 
    const COL_WIDTH = 250;
    let myChart = null;
    let globalMinDate = new Date();

    async function loadGantt() {
        try {
            const { data: tickets, error } = await client.from('tickets').select('*');
            if (error) throw error;
            
            if (tickets && tickets.length > 0) {
                let earliest = new Date();
                tickets.forEach(t => {
                    if (t.data_inserimento) {
                        const d = new Date(t.data_inserimento);
                        if (d < earliest) earliest = d;
                    }
                });
                earliest.setDate(earliest.getDate() - 5);
                globalMinDate = earliest;
                render(tickets);
            }
        } catch (err) { console.error("Errore caricamento:", err); }
    }

    function render(tickets) {
        const header = document.getElementById('timeline-header');
        const content = document.getElementById('gantt-content');
        const now = new Date();
        let delayCount = 0;
        let stats = { 'Nuovo': 0, 'In Lavorazione': 0, 'Risolto': 0, 'Verificato': 0, 'Accettato': 0, 'Chiuso': 0, 'Altro': 0 };

        const totalDays = 200;
        header.innerHTML = `<div class="sticky-col h-full border-r border-slate-700"></div>` + 
            Array.from({length: totalDays}, (_, i) => {
                let d = new Date(globalMinDate); d.setDate(d.getDate() + i);
                return `<div class="timeline-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
            }).join('');
        
        header.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;
        content.innerHTML = '';

        tickets.sort((a,b) => b.id - a.id).forEach(t => {
            const sRaw = (t.stato || "NUOVO").toUpperCase();
            let sKey = 'Altro';
            if (sRaw.includes("NUOVO") || sRaw.includes("APERTO")) sKey = 'Nuovo';
            else if (sRaw.includes("LAVORAZIONE") || sRaw.includes("CORSO")) sKey = 'In Lavorazione';
            else if (sRaw.includes("RISOLTO")) sKey = 'Risolto';
            else if (sRaw.includes("VERIFICATO")) sKey = 'Verificato';
            else if (sRaw.includes("ACCETTATO") || sRaw.includes("APPROVATO")) sKey = 'Accettato';
            else if (sRaw.includes("CHIUSO")) sKey = 'Chiuso';
            stats[sKey]++;

            const row = document.createElement('div');
            row.className = "flex row-height relative hover:bg-slate-800/40";
            row.style.width = header.style.width;
            
            let isDelayed = false;
            const trackId = `tr-${t.id}`;
            row.innerHTML = `
                <div class="sticky-col flex items-center px-6 border-r border-slate-700">
                    <div class="truncate">
                        <div class="font-black text-blue-500 text-xs">#${t.id}</div>
                        <div class="font-bold text-white text-[10px] uppercase truncate w-40">${t.titolo || 'N/A'}</div>
                        <div class="text-[9px] opacity-50 font-bold">${sRaw}</div>
                    </div>
                </div>
                <div class="track-container" id="${trackId}"></div>`;
            content.appendChild(row);

            const track = document.getElementById(trackId);
            const dStart = t.data_inserimento ? new Date(t.data_inserimento) : now;
            // Se chiuso usa data chiusura, altrimenti usa OGGI per far proseguire la linea
            const dEndBaseline = t.datachiuso ? new Date(t.datachiuso) : now;
            
            // Baseline Bianca (Durata totale ticket)
            const bl = document.createElement('div');
            bl.className = "baseline-ticket";
            const leftPos = ((dStart - globalMinDate)/86400000)*DAY_PX;
            const widthBaseline = ((dEndBaseline - dStart)/86400000)*DAY_PX;
            
            bl.style.left = `${leftPos}px`;
            bl.style.width = `${Math.max(10, widthBaseline)}px`;
            track.appendChild(bl);

            const map = [
                {s:'datanuovo', e:'datanuovos', l:'Nuovo', c:'st-nuovo'},
                {s:'datainlavorazione', e:'datainlavoraziones', l:'Lavorazione', c:'st-lavorazione'},
                {s:'datarisolto', e:'datarisoltos', l:'Risolto', c:'st-risolto'},
                {s:'dataverificato', e:'dataverificatos', l:'Verificato', c:'st-verificato'},
                {s:'dataaccettato', e:'dataaccettatos', l:'Accettato', c:'st-accettato'},
                {s:'datachiuso', e:'datachiusos', l:'Chiuso', c:'st-chiuso'}
            ];

            map.forEach((m, i) => {
                if(t[m.s] && t[m.e]) {
                    const dS = new Date(t[m.s]), dE = new Date(t[m.e]);
                    const bar = document.createElement('div');
                    bar.className = `seg-bar ${m.c} pos-${i % 3}`;
                    bar.style.left = `${((dS - globalMinDate)/86400000)*DAY_PX}px`;
                    bar.style.width = `${Math.max(20, ((dE - dS)/86400000)*DAY_PX)}px`;
                    bar.innerHTML = `<span class="px-2">${m.l}</span>`;
                    track.appendChild(bar);

                    if(sRaw.includes(m.l.toUpperCase()) && now > dE && !t.datachiuso) {
                        isDelayed = true;
                        const dBar = document.createElement('div');
                        dBar.className = `seg-bar delay-fill pos-${i % 3}`;
                        dBar.style.left = `${((dE - globalMinDate)/86400000)*DAY_PX}px`;
                        dBar.style.width = `${((now - dE)/86400000)*DAY_PX}px`;
                        track.appendChild(dBar);
                    }
                }
            });

            if(isDelayed) { delayCount++; row.querySelector('.sticky-col').classList.add('ticket-delayed'); }
        });

        document.getElementById('delay-count').innerText = delayCount;
        updateChart(stats);
        
        const line = document.createElement('div');
        line.className = "today-line";
        line.style.left = `${COL_WIDTH + ((now - globalMinDate)/86400000)*DAY_PX}px`;
        content.appendChild(line);
    }

    function updateChart(s) {
        const ctx = document.getElementById('stateChart');
        if (!ctx) return;
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx.getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(s),
                datasets: [{
                    data: Object.values(s),
                    backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#ec4899', '#64748b', '#475569'],
                    borderWidth: 0
                }]
            },
            options: { 
                plugins: { legend: { position: 'right', labels: { color: '#fff', font: { size: 9 } } } },
                cutout: '70%', responsive: true, maintainAspectRatio: false 
            }
        });
    }

    window.onload = loadGantt;
</script>
</body>
</html>
