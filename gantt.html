<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Gantt System | Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        
        /* Contenitore principale per gestire lo scroll */
        .gantt-viewport { 
            overflow: auto; 
            background: #1e293b; 
            border-radius: 24px; 
            border: 1px solid #334155; 
            height: 650px; 
            scroll-behavior: smooth; 
            position: relative;
        }

        .row-height { 
            height: 125px; 
            border-bottom: 1px solid #334155; 
            display: flex; 
            position: relative;
        }
        
        /* COLONNA FISSA: Z-INDEX 150 PER STARE SOPRA TUTTO */
        .sticky-col { 
            position: sticky; 
            left: 0; 
            z-index: 150; 
            background: #1e293b; 
            border-right: 4px solid #3b82f6; 
            min-width: 250px; 
            width: 250px;
            display: flex; 
            align-items: center; 
            padding: 0 20px;
            box-shadow: 10px 0 15px rgba(0,0,0,0.4);
        }

        /* AREA BARRE: Z-INDEX BASSO */
        .track-container { 
            position: relative; 
            flex-grow: 1;
            z-index: 10;
        }
        
        .baseline-ticket {
            position: absolute;
            height: 8px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            z-index: 5;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid #ffffff;
        }

        .seg-bar { 
            position: absolute; height: 26px; border-radius: 6px; z-index: 20;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
            padding: 0 10px; font-size: 9px; font-weight: 800; text-transform: uppercase;
        }

        /* Posizioni verticali barre */
        .pos-0 { top: 15px; } .pos-1 { top: 50px; } .pos-2 { top: 85px; }

        .delay-fill {
            background: repeating-linear-gradient(45deg, #ef4444, #ef4444 12px, #991b1b 12px, #991b1b 24px);
            border: 1px solid #f87171; animation: pulse-red 2s infinite; z-index: 15;
        }

        @keyframes pulse-red { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        @keyframes blink-text { 0%, 100% { color: #ef4444; } 50% { color: #ffffff; } }

        .st-nuovo { background: #3b82f6; } .st-lavorazione { background: #f59e0b; }
        .st-risolto { background: #10b981; } .st-verificato { background: #8b5cf6; }
        .st-accettato { background: #ec4899; } .st-chiuso { background: #64748b; }

        .timeline-cell { min-width: 50px; text-align: center; font-size: 10px; color: #64748b; border-right: 1px solid #334155; padding: 14px 0; font-family: 'JetBrains Mono', monospace; }
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 140; pointer-events: none; }

        .ticket-delay-id { animation: blink-text 1.5s infinite; font-weight: 900 !important; }
        .row-delay-bg { background: linear-gradient(90deg, rgba(153, 27, 27, 0.2) 0%, rgba(30, 41, 59, 0) 100%); }
    </style>
</head>
<body class="p-8" onload="loadGantt()">

<div class="max-w-[1900px] mx-auto">
    <div class="flex justify-between items-center mb-6">
        <a href="menu.html" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-xl border border-slate-600 transition flex items-center gap-2 font-bold text-sm">
            <i class="fas fa-th-large"></i> Menu Principale
        </a>
        <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">PROJECT <span class="text-blue-500">CONTROL</span></h1>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
        <div class="bg-[#1e293b] border border-slate-700 rounded-[20px] p-6 flex flex-col justify-center items-center border-l-8 border-red-600 shadow-xl">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">SLA Superati</h3>
            <span id="delay-count" class="text-6xl font-black text-white mt-2">0</span>
        </div>
        <div class="bg-[#1e293b] border border-slate-700 rounded-[20px] p-6 flex flex-col items-center justify-between">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Stato Task</h3>
            <div class="relative w-full h-36 flex justify-center items-center">
                <canvas id="stateChart"></canvas>
            </div>
        </div>
        <div class="bg-[#1e293b] border border-slate-700 rounded-[20px] p-6 flex flex-col justify-center px-10">
            <button onclick="loadGantt()" class="bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black transition-all text-xs uppercase shadow-lg flex items-center justify-center">
                <i class="fas fa-sync-alt mr-3"></i>Aggiorna Dati
            </button>
        </div>
    </div>

    <div class="gantt-viewport shadow-2xl" id="viewport">
        <div id="timeline-header" class="flex bg-slate-800 sticky top-0 z-[200]"></div>
        <div id="gantt-content"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG1kbG9pY25mcXlpeGx4d2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDgyODEsImV4cCI6MjA4NzU4NDI4MX0.EyPcvKFabIL_BX67S0MKLm4ccvHFr4Fiq3glt_iSJWg';
    const client = supabase.createClient(SB_URL, SB_KEY);
    
    const DAY_PX = 50; 
    const COL_WIDTH = 250;
    let myChart = null;

    async function loadGantt() {
        try {
            const { data: tickets, error } = await client.from('tickets').select('*');
            if (error) throw error;
            const sortedTickets = tickets.sort((a, b) => (parseInt(b.id) || 0) - (parseInt(a.id) || 0));
            render(sortedTickets);
        } catch (err) { console.error(err); }
    }

    function render(tickets) {
        const header = document.getElementById('timeline-header');
        const content = document.getElementById('gantt-content');
        const viewport = document.getElementById('viewport');
        const now = new Date();
        let delayCounter = 0;
        let stateCounts = { nuovo:0, lavorazione:0, risolto:0, verificato:0, accettato:0, chiuso:0 };
        
        let minDate = new Date();
        minDate.setDate(minDate.getDate() - 15);
        tickets.forEach(t => {
            const d = t.data_inserimento ? new Date(t.data_inserimento) : null;
            if (d && !isNaN(d) && d < minDate) minDate = d;
        });
        minDate.setHours(0,0,0,0);

        const totalDays = 120; 
        let hHtml = `<div class="sticky-col" style="height: 45px; background: #0f172a; border-right: 4px solid #3b82f6;"></div>`;
        for (let i = 0; i < totalDays; i++) {
            let d = new Date(minDate); d.setDate(d.getDate() + i);
            hHtml += `<div class="timeline-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
        }
        header.innerHTML = hHtml;
        header.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

        content.innerHTML = '';
        tickets.forEach(t => {
            const mapping = [
                {start:'datanuovo', end:'datanuovos', label:'Nuovo', class:'st-nuovo', key:'nuovo'},
                {start:'datainlavorazione', end:'datainlavoraziones', label:'Lavorazione', class:'st-lavorazione', key:'lavorazione'},
                {start:'datarisolto', end:'datarisoltos', label:'Risolto', class:'st-risolto', key:'risolto'},
                {start:'dataverificato', end:'dataverificatos', label:'Verificato', class:'st-verificato', key:'verificato'},
                {start:'dataaccettato', end:'dataaccettatos', label:'Accettato', class:'st-accettato', key:'accettato'},
                {start:'datachiuso', end:'datachiusos', label:'Chiuso', class:'st-chiuso', key:'chiuso'}
            ];

            const activeStates = mapping.filter(m => t[m.start] && !isNaN(new Date(t[m.start]).getTime()))
                                         .map(m => ({...m, d: new Date(t[m.start]), dEnd: new Date(t[m.end])}));
            activeStates.sort((a,b) => b.d - a.d);
            
            let isDelay = false;
            if(activeStates.length > 0) {
                stateCounts[activeStates[0].key]++;
                if(now > activeStates[0].dEnd && !t.datachiuso) {
                    isDelay = true;
                    delayCounter++;
                }
            }

            const row = document.createElement('div');
            row.className = `row-height ${isDelay ? 'row-delay-bg' : ''}`;
            row.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;
            
            row.innerHTML = `
                <div class="sticky-col ${isDelay ? 'row-delay-bg' : ''}">
                    <div class="truncate">
                        <div class="${isDelay ? 'ticket-delay-id' : 'text-blue-500'} font-black text-sm">
                            ${isDelay ? '⚠️ ' : ''}#${t.id}
                        </div>
                        <div class="text-white text-[11px] font-bold uppercase truncate">${t.titolo || 'N/A'}</div>
                    </div>
                </div>
                <div class="track-container" id="track-${t.id}"></div>
            `;
            content.appendChild(row);

            const track = document.getElementById(`track-${t.id}`);
            const validDates = [t.data_inserimento, t.datanuovo, t.datainlavorazione, t.datarisolto, t.dataverificato, t.dataaccettato, t.datachiuso]
                .filter(d => d && !isNaN(new Date(d).getTime())).map(d => new Date(d));

            if (validDates.length > 0) {
                const dStart = new Date(Math.min(...validDates));
                const dEnd = (t.datachiuso && !isNaN(new Date(t.datachiuso))) ? new Date(t.datachiuso) : now;
                const baseLine = document.createElement('div');
                baseLine.className = "baseline-ticket";
                baseLine.style.left = `${((dStart - minDate)/86400000)*DAY_PX}px`;
                baseLine.style.width = `${Math.max(20, ((dEnd - dStart)/86400000)*DAY_PX)}px`;
                track.appendChild(baseLine);
            }

            mapping.forEach((m, idx) => {
                if(t[m.start] && t[m.end]) {
                    const dS = new Date(t[m.start]), dE = new Date(t[m.end]);
                    if(isNaN(dS) || isNaN(dE)) return;

                    const bar = document.createElement('div');
                    bar.className = `seg-bar ${m.class} pos-${idx % 3}`;
                    bar.style.left = `${((dS - minDate)/86400000)*DAY_PX}px`;
                    bar.style.width = `${Math.max(10, ((dE - dS)/86400000)*DAY_PX)}px`;
                    bar.innerHTML = `<span>${m.label}</span>`;
                    
                    if(m.start === (activeStates[0]?.start) && now > dE && !t.datachiuso) {
                        const dBar = document.createElement('div');
                        dBar.className = `seg-bar delay-fill pos-${idx % 3}`;
                        dBar.style.left = `${((dE - minDate)/86400000)*DAY_PX}px`;
                        dBar.style.width = `${((now - dE)/86400000)*DAY_PX}px`;
                        track.appendChild(dBar);
                    }
                    track.appendChild(bar);
                }
            });
        });

        document.getElementById('delay-count').innerText = delayCounter;
        updateChart(stateCounts);
        
        const todayOffset = ((now - minDate)/86400000)*DAY_PX;
        const tLine = document.createElement('div');
        tLine.className = "today-line";
        tLine.style.left = `${COL_WIDTH + todayOffset}px`;
        content.appendChild(tLine);

        setTimeout(() => { viewport.scrollLeft = todayOffset - 200; }, 300);
    }

    function updateChart(counts) {
        const ctx = document.getElementById('stateChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Nuovo', 'Lavorazione', 'Risolto', 'Verificato', 'Accettato', 'Chiuso'],
                datasets: [{
                    data: [counts.nuovo, counts.lavorazione, counts.risolto, counts.verificato, counts.accettato, counts.chiuso],
                    backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#ec4899', '#64748b'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { display: false } }, cutout: '80%', responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
