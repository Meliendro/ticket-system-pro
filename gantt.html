<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Advanced Life-Cycle | RIVIT Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        .gantt-viewport { overflow-x: auto; background: #1e293b; border-radius: 20px; border: 1px solid #334155; }
        .row-height { height: 90px; border-bottom: 1px solid #334155; position: relative; }
        
        /* Container Barre */
        .master-bar { position: absolute; height: 46px; top: 22px; background: rgba(51, 65, 85, 0.3); border-radius: 8px; border: 1px dashed #475569; z-index: 1; pointer-events: none; }
        .segment-wrapper { position: absolute; height: 32px; top: 29px; display: flex; z-index: 10; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        /* Segmenti Stati */
        .seg { height: 100%; position: relative; transition: all 0.2s; cursor: help; }
        .seg:hover { filter: brightness(1.2); }
        
        .seg-nuovo { background: #3b82f6; }
        .seg-lavorazione { background: #f59e0b; }
        .seg-risolto { background: #10b981; }
        .seg-verificato { background: #8b5cf6; }
        .seg-accettato { background: #ec4899; }
        .seg-chiuso { background: #64748b; }
        .seg-rifiutato { background: #ef4444; }
        .seg-attesa { background: #06b6d4; }

        /* Marker Scadenza (i campi con la 's') */
        .deadline-marker { position: absolute; width: 2px; height: 54px; top: 18px; background: #ff4757; z-index: 30; pointer-events: none; }
        .deadline-marker::after { content: '🚩'; position: absolute; top: -16px; left: -7px; font-size: 11px; filter: drop-shadow(0 0 2px black); }

        .timeline-cell { min-width: 50px; text-align: center; font-size: 10px; color: #94a3b8; border-right: 1px solid #334155; padding: 12px 0; font-family: 'JetBrains Mono', monospace; }
        .sticky-col { position: sticky; left: 0; z-index: 100; background: #1e293b; border-right: 3px solid #3b82f6; min-width: 280px; max-width: 280px; }
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 150; pointer-events: none; }
        .today-line::before { content: 'OGGI'; position: absolute; top: 0; left: 4px; background: #ef4444; color: white; font-size: 8px; font-weight: bold; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-[1900px] mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter italic">RIVIT <span class="text-blue-500 text-not-italic">GANTT 2.0</span></h1>
            <p class="text-slate-400 font-medium text-sm">Controllo incrociato scadenze previste ('s') vs stati effettivi</p>
        </div>
        <button onclick="loadGantt()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-bold transition-all shadow-[0_0_20px_rgba(37,99,235,0.3)]">
            <i class="fas fa-sync-alt mr-2"></i> AGGIORNA TIMELINE
        </button>
    </header>

    <div class="gantt-viewport shadow-2xl" id="viewport">
        <div id="timeline-header" class="flex bg-slate-800/80 backdrop-blur-md sticky top-0 z-[110]"></div>
        <div id="gantt-content" class="relative"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG1kbG9pY25mcXlpeGx4d2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDgyODEsImV4cCI6MjA4NzU4NDI4MX0.EyPcvKFabIL_BX67S0MKLm4ccvHFr4Fiq3glt_iSJWg';
    const client = supabase.createClient(SB_URL, SB_KEY);
    
    const DAY_PX = 50; 
    const COL_WIDTH = 280;

    async function loadGantt() {
        const content = document.getElementById('gantt-content');
        content.innerHTML = '<div class="p-20 text-center text-blue-400 font-bold tracking-widest">SINCRONIZZAZIONE DATI...</div>';
        const { data: tickets, error } = await client.from('tickets').select('*');
        if (error) { content.innerHTML = `<div class="p-20 text-red-400">Errore: ${error.message}</div>`; return; }
        render(tickets);
    }

    function render(tickets) {
        const header = document.getElementById('timeline-header');
        const content = document.getElementById('gantt-content');
        
        let minDate = new Date();
        minDate.setDate(minDate.getDate() - 7);
        tickets.forEach(t => {
            if(t.data_inserimento) {
                let d = new Date(t.data_inserimento);
                if(d < minDate) minDate = new Date(d);
            }
        });
        minDate.setHours(0,0,0,0);

        const maxDate = new Date(minDate);
        maxDate.setDate(maxDate.getDate() + 45); 
        const totalDays = Math.ceil((maxDate - minDate) / 86400000);

        // Header Timeline
        let hHtml = `<div class="sticky-col h-full border-r border-slate-700"></div>`;
        for (let i = 0; i < totalDays; i++) {
            let d = new Date(minDate); d.setDate(d.getDate() + i);
            hHtml += `<div class="timeline-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
        }
        header.innerHTML = hHtml;
        header.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

        content.innerHTML = '';
        tickets.forEach(t => {
            const row = document.createElement('div');
            row.className = "flex row-height relative hover:bg-slate-800/40 transition-colors";
            row.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

            const mapping = [
                {k:'datanuovo', s:'nuovo', sk: 'datanuovos'},
                {k:'datainlavorazione', s:'lavorazione', sk: 'datainlavoraziones'},
                {k:'datarisolto', s:'risolto', sk: 'datarisoltos'},
                {k:'dataverificato', s:'verificato', sk: 'dataverificatos'},
                {k:'dataaccettato', s:'accettato', sk: 'dataaccettatos'},
                {k:'datachiuso', s:'chiuso', sk: 'datachiusos'},
                {k:'datarifiutato', s:'rifiutato', sk: 'datarifiutatos'},
                {k:'datainattesa', s:'attesa', sk: 'datainattesas'}
            ];

            const states = [];
            mapping.forEach(m => {
                if(t[m.k]) states.push({ d: new Date(t[m.k]), s: m.s, d_limit: t[m.sk] ? new Date(t[m.sk]) : null });
            });
            states.sort((a,b) => a.d - b.d);

            row.innerHTML = `
                <div class="sticky-col flex items-center px-6 border-r border-slate-700 z-[100]">
                    <div class="overflow-hidden">
                        <div class="font-extrabold text-[12px] text-blue-400 truncate tracking-tight">#${t.id} - ${t.titolo || 'SENZA TITOLO'}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase mt-1 italic">${t.operatore || 'LIBERO'}</div>
                    </div>
                </div>
                <div class="flex-grow relative" id="track-${t.id}"></div>
            `;
            content.appendChild(row);
            const track = document.getElementById(`track-${t.id}`);

            // 1. Barra Master (Programmazione)
            if(t.inizioprevisto && t.fineprevista) {
                const sM = new Date(t.inizioprevisto);
                const eM = new Date(t.fineprevista);
                const offM = (sM - minDate) / 86400000;
                const durM = (eM - sM) / 86400000;
                const mBar = document.createElement('div');
                mBar.className = "master-bar";
                mBar.style.left = `${offM * DAY_PX}px`;
                mBar.style.width = `${durM * DAY_PX}px`;
                track.appendChild(mBar);
            }

            // 2. Rendering Segmenti e Marker
            if(states.length > 0) {
                const wrapper = document.createElement('div');
                wrapper.className = "segment-wrapper";
                wrapper.style.left = `${((states[0].d - minDate) / 86400000) * DAY_PX}px`;

                states.forEach((curr, idx) => {
                    const startD = curr.d;
                    // Calcolo fine: se c'è uno stato dopo usa quello, altrimenti OGGI
                    let endD = (idx < states.length - 1) ? states[idx+1].d : new Date();
                    
                    // Se il ticket è CHIUSO, l'ultimo segmento finisce esattamente alla data di chiusura
                    if (idx === states.length - 1 && t.datachiuso) {
                        endD = new Date(t.datachiuso);
                    }

                    const durationDays = Math.max(0.05, (endD - startD) / 86400000);
                    
                    const seg = document.createElement('div');
                    seg.className = `seg seg-${curr.s}`;
                    seg.style.width = `${durationDays * DAY_PX}px`;
                    
                    // Tooltip Corretto
                    seg.title = `STATO: ${curr.s.toUpperCase()}\nInizio: ${startD.toLocaleDateString()} ${startD.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}\nFine: ${endD.toLocaleDateString()} ${endD.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                    
                    wrapper.appendChild(seg);

                    // Marker Scadenza ('s')
                    if(curr.d_limit) {
                        const mLimit = document.createElement('div');
                        mLimit.className = "deadline-marker";
                        // Posizionamento preciso a fine giornata del marker
                        const limitOffset = (new Date(curr.d_limit).setHours(23,59,59) - minDate) / 86400000;
                        mLimit.style.left = `${limitOffset * DAY_PX}px`;
                        mLimit.title = `SCADENZA PREVISTA (${curr.s}): ${new Date(curr.d_limit).toLocaleDateString()}`;
                        track.appendChild(mLimit);
                    }
                });
                track.appendChild(wrapper);
            }
        });

        // Today Line
        const tLine = document.createElement('div');
        tLine.className = "today-line";
        tLine.style.left = `${COL_WIDTH + ((new Date() - minDate) / 86400000) * DAY_PX}px`;
        content.appendChild(tLine);
    }
    loadGantt();
</script>
</body>
</html>
