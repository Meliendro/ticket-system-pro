<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Gantt System | Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        .gantt-viewport { overflow-x: auto; background: #1e293b; border-radius: 24px; border: 1px solid #334155; height: 650px; scroll-behavior: smooth; position: relative; }
        .row-height { min-height: 125px; border-bottom: 1px solid #334155; position: relative; display: flex; align-items: center; }
        
        .track-container { position: relative; flex-grow: 1; height: 95px; }
        
        .baseline-ticket {
            position: absolute; height: 8px; background: rgba(255, 255, 255, 0.9);
            border-radius: 20px; top: 40px; z-index: 5; pointer-events: none;
            border: 1px solid white; box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .seg-bar { 
            position: absolute; height: 26px; border-radius: 6px; z-index: 20; cursor: help;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
            padding: 0 10px; font-size: 9px; font-weight: 800; text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); white-space: nowrap;
        }

        .seg-bar::after {
            content: attr(data-tooltip); position: absolute; bottom: 130%; left: 50%;
            transform: translateX(-50%); background: #000; color: #fff; padding: 8px 12px;
            border-radius: 8px; font-size: 11px; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            pointer-events: none; border: 1px solid #475569; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .seg-bar:hover::after { opacity: 1; visibility: visible; }
        .seg-bar:hover { transform: translateY(-2px); z-index: 500; outline: 2px solid white; }

        .pos-0 { top: 4px; } .pos-1 { top: 31px; } .pos-2 { top: 58px; }

        .delay-fill {
            background: repeating-linear-gradient(45deg, #ef4444, #ef4444 12px, #991b1b 12px, #991b1b 24px);
            border: 1px solid #f87171; animation: pulse-red 2s infinite; z-index: 30;
        }

        @keyframes pulse-red { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        @keyframes alert-row { 0%, 100% { background: #1e293b; } 50% { background: #450a0a; } }
        .ticket-delayed { animation: alert-row 3s infinite ease-in-out; border-right: 4px solid #ef4444 !important; }

        .st-nuovo { background: #3b82f6; } 
        .st-lavorazione { background: #f59e0b; }
        .st-risolto { background: #10b981; } 
        .st-verificato { background: #8b5cf6; }
        .st-accettato { background: #ec4899; } 
        .st-chiuso { background: #64748b; }

        .timeline-cell { min-width: 50px; text-align: center; font-size: 10px; color: #64748b; border-right: 1px solid #334155; padding: 14px 0; font-family: 'JetBrains Mono', monospace; }
        
        .sticky-col { 
            position: sticky; left: 0; z-index: 100; background: #1e293b; 
            border-right: 4px solid #3b82f6; min-width: 250px; max-width: 250px;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); 
        }
        
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 150; pointer-events: none; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 24px; min-height: 200px; }
    </style>
</head>
<body class="p-8" onload="loadGantt()">

            <span id="delay-count" class="text-6xl font-black text-white mt-2">0</span>

        <div class="stat-card flex flex-col items-center">

            <div class="relative w-full h-44">
                <canvas id="stateChart"></canvas>
            </div>
        </div>

        <div class="stat-card flex flex-col justify-center border-l-8 border-blue-600 shadow-xl px-10">

                    <i class="fas fa-sync-alt mr-2 text-xs"></i>Aggiorna
                </button>
                <button onclick="window.location.href='menu.html'" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-4 rounded-2xl font-black transition-all text-[10px] uppercase shadow-lg flex items-center justify-center">
                    <i class="fas fa-th mr-2 text-xs"></i>Menu Principale
                </button>
            </div>
        </div>
    </div>

    <div class="gantt-viewport shadow-2xl" id="viewport">
        <div id="timeline-header" class="flex bg-slate-800/95 backdrop-blur-md sticky top-0 z-[110]"></div>
        <div id="gantt-content" class="relative"></div>
    </div>
</div>
