<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Gantt System | Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        .gantt-viewport { overflow-x: auto; background: #1e293b; border-radius: 24px; border: 1px solid #334155; height: 650px; }
        .row-height { min-height: 120px; border-bottom: 1px solid #334155; position: relative; display: flex; align-items: center; }
        
        .track-container { position: relative; width: 100%; height: 90px; }
        
        /* Linea di fondo (Binario del Ticket) */
        .baseline-ticket {
            position: absolute;
            height: 6px;
            background: #334155;
            border-radius: 10px;
            top: 42px; 
            z-index: 5;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Barre di Stato */
        .seg-bar { 
            position: absolute; height: 24px; border-radius: 6px; z-index: 20; cursor: help;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
            padding: 0 8px; font-size: 9px; font-weight: 800; text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .seg-bar:hover { transform: scaleY(1.15); z-index: 60; outline: 2px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .pos-0 { top: 6px; } .pos-1 { top: 33px; } .pos-2 { top: 60px; }

        /* Delay Pattern */
        .delay-fill {
            background: repeating-linear-gradient(45deg, #ef4444, #ef4444 10px, #b91c1c 10px, #b91c1c 20px);
            border: 1px solid #f87171; animation: pulse-red 2s infinite; z-index: 15;
        }

        @keyframes pulse-red { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        .st-nuovo { background: #3b82f6; } .st-lavorazione { background: #f59e0b; }
        .st-risolto { background: #10b981; } .st-verificato { background: #8b5cf6; }
        .st-accettato { background: #ec4899; } .st-chiuso { background: #64748b; }

        .timeline-cell { min-width: 50px; text-align: center; font-size: 10px; color: #64748b; border-right: 1px solid #334155; padding: 14px 0; font-family: 'JetBrains Mono', monospace; }
        .sticky-col { position: sticky; left: 0; z-index: 100; background: #1e293b; border-right: 4px solid #3b82f6; min-width: 250px; box-shadow: 10px 0 20px -5px rgba(0,0,0,0.7); }
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 150; pointer-events: none; }
        
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 24px; min-height: 200px; }
    </style>
</head>
<body class="p-8" onload="loadGantt()">

<div class="max-w-[1900px] mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
        <div class="stat-card flex flex-col justify-center items-center border-l-8 border-red-600 shadow-xl">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">SLA Superati</h3>
            <span id="delay-count" class="text-6xl font-black text-white mt-2">0</span>
            <p class="text-[10px] text-red-500 mt-3 font-bold animate-pulse">INTERVENTO IMMEDIATO</p>
        </div>

        <div class="stat-card flex flex-col items-center justify-between">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Avanzamento Globale</h3>
            <div class="relative w-full h-36 flex justify-center items-center">
                <canvas id="stateChart"></canvas>
            </div>
        </div>

        <div class="stat-card flex flex-col justify-center border-l-8 border-blue-600 shadow-xl px-10">
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">PROJECT <span class="text-blue-500">CONTROL HUB</span></h1>
            <button onclick="loadGantt()" class="mt-6 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black transition-all text-xs uppercase shadow-lg flex items-center justify-center">
                <i class="fas fa-sync-alt mr-3 text-sm"></i>Sincronizza Database
            </button>
        </div>
    </div>

    <div class="gantt-viewport shadow-2xl" id="viewport">
        <div id="timeline-header" class="flex bg-slate-800/95 backdrop-blur-md sticky top-0 z-[110]"></div>
        <div id="gantt-content" class="relative"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG1kbG9pY25mcXlpeGx4d2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDgyODEsImV4cCI6MjA4NzU4NDI4MX0.EyPcvKFabIL_BX67S0MKLm4ccvHFr4Fiq3glt_iSJWg';
    const client = supabase.createClient(SB_URL, SB_KEY);
    
    const DAY_PX = 50; 
    const COL_WIDTH = 250;
    let myChart = null;

    async function loadGantt() {
        console.log("Inizio caricamento dati...");
        try {
            const { data: tickets, error } = await client.from('tickets').select('*');
            if (error) throw error;
            console.log("Dati ricevuti:", tickets);
            render(tickets);
        } catch (err) {
            console.error("Errore critico:", err);
            alert("Errore nel caricamento dei dati. Controlla la console.");
        }
    }

    function render(tickets) {
        const header = document.getElementById('timeline-header');
        const content = document.getElementById('gantt-content');
        const now = new Date();
        let delayCounter = 0;
        let stateCounts = { nuovo: 0, lavorazione: 0, risolto: 0, verificato: 0, accettato: 0, chiuso: 0 };
        
        // Calcolo data minima
        let minDate = new Date();
        minDate.setDate(minDate.getDate() - 10);
        tickets.forEach(t => {
            if (t.data_inserimento) {
                const d = new Date(t.data_inserimento);
                if (d < minDate) minDate = d;
            }
        });
        minDate.setHours(0,0,0,0);

        const totalDays = 90; // Esteso per visibilità
        let hHtml = `<div class="sticky-col h-full border-r border-slate-700"></div>`;
        for (let i = 0; i < totalDays; i++) {
            let d = new Date(minDate); d.setDate(d.getDate() + i);
            hHtml += `<div class="timeline-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
        }
        header.innerHTML = hHtml;
        header.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

        content.innerHTML = '';
        
        if (!tickets || tickets.length === 0) {
            content.innerHTML = '<div class="p-10 text-center text-slate-500">Nessun ticket trovato nel database.</div>';
            return;
        }

        tickets.forEach(t => {
            const row = document.createElement('div');
            row.className = "flex row-height relative hover:bg-slate-800/40 transition-colors";
            row.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

            row.innerHTML = `<div class="sticky-col flex items-center px-8 border-r border-slate-700 z-[100]">
                <div><div class="font-black text-blue-500 text-sm">#${t.id}</div><div class="font-bold text-white text-[11px] uppercase truncate w-44">${t.titolo || 'TASK'}</div></div>
                </div><div class="flex-grow relative track-container" id="track-${t.id}"></div>`;
            content.appendChild(row);

            const track = document.getElementById(`track-${t.id}`);

            // 1. Linea Base
            const dStartTicket = t.data_inserimento ? new Date(t.data_inserimento) : null;
            if (dStartTicket) {
                const dEndTicket = t.datachiuso ? new Date(t.datachiuso) : now;
                const baseLine = document.createElement('div');
                baseLine.className = "baseline-ticket";
                baseLine.style.left = `${((dStartTicket - minDate)/86400000)*DAY_PX}px`;
                baseLine.style.width = `${Math.max(10, ((dEndTicket - dStartTicket)/86400000)*DAY_PX)}px`;
                track.appendChild(baseLine);
            }

            const mapping = [
                {start:'datanuovo', end:'datanuovos', label:'Nuovo', class:'st-nuovo', key:'nuovo'},
                {start:'datainlavorazione', end:'datainlavoraziones', label:'Lavorazione', class:'st-lavorazione', key:'lavorazione'},
                {start:'datarisolto', end:'datarisoltos', label:'Risolto', class:'st-risolto', key:'risolto'},
                {start:'dataverificato', end:'dataverificatos', label:'Verificato', class:'st-verificato', key:'verificato'},
                {start:'dataaccettato', end:'dataaccettatos', label:'Accettato', class:'st-accettato', key:'accettato'},
                {start:'datachiuso', end:'datachiusos', label:'Chiuso', class:'st-chiuso', key:'chiuso'}
            ];

            // Identifica stato attivo
            const activeStates = mapping.filter(m => t[m.start]).map(m => ({...m, d: new Date(t[m.start])}));
            activeStates.sort((a,b) => b.d - a.d);
            const currentStateKey = activeStates.length > 0 ? activeStates[0].start : null;
            if(activeStates.length > 0) stateCounts[activeStates[0].key]++;

            mapping.forEach((m, idx) => {
                if(t[m.start] && t[m.end]) {
                    const dS = new Date(t[m.start]), dE = new Date(t[m.end]);
                    if (isNaN(dS) || isNaN(dE)) return;

                    const bar = document.createElement('div');
                    bar.className = `seg-bar ${m.class} pos-${idx % 3}`;
                    bar.style.left = `${((dS - minDate)/86400000)*DAY_PX}px`;
                    bar.style.width = `${(Math.max(0.1, (dE - dS)/86400000))*DAY_PX}px`;
                    bar.innerHTML = `<span>${m.label}</span>`;
                    
                    if(m.start === currentStateKey && now > dE && !t.datachiuso) {
                        delayCounter++;
                        const dBar = document.createElement('div');
                        dBar.className = `seg-bar delay-fill pos-${idx % 3}`;
                        dBar.style.left = `${((dE - minDate)/86400000)*DAY_PX}px`;
                        dBar.style.width = `${((now - dE)/86400000)*DAY_PX}px`;
                        track.appendChild(dBar);
                    }
                    track.appendChild(bar);
                }
            });
        });

        document.getElementById('delay-count').innerText = delayCounter;
        updateChart(stateCounts);
        
        const tLine = document.createElement('div');
        tLine.className = "today-line";
        tLine.style.left = `${COL_WIDTH + ((now - minDate)/86400000)*DAY_PX}px`;
        content.appendChild(tLine);
    }

    function updateChart(counts) {
        const ctx = document.getElementById('stateChart').getContext('2d');
        const dataValues = [counts.nuovo, counts.lavorazione, counts.risolto, counts.verificato, counts.accettato, counts.chiuso];
        const hasData = dataValues.some(v => v > 0);

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Nuovo', 'Lavorazione', 'Risolto', 'Verificato', 'Accettato', 'Chiuso'],
                datasets: [{
                    data: hasData ? dataValues : [1],
                    backgroundColor: hasData ? ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#ec4899', '#64748b'] : ['#334155'],
                    borderWidth: 0
                }]
            },
            options: { 
                plugins: { legend: { display: false } }, 
                cutout: '80%',
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }
</script>
</body>
</html>
