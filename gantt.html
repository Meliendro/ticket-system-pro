<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Ciclo Vita Ticket | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8fafc; }
        .gantt-container { overflow-x: auto; background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .row-height { height: 70px; }
        
        /* Contenitore segmenti */
        .bar-wrapper { position: absolute; height: 34px; top: 18px; display: flex; align-items: stretch; }
        .bar-segment { height: 100%; position: relative; transition: all 0.2s; border-right: 1px solid rgba(0,0,0,0.05); }
        .bar-segment:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .bar-segment:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; border-right: none; }
        
        .bar-label { 
            position: absolute; top: -16px; left: 4px; font-size: 9px; 
            font-weight: 800; text-transform: uppercase; color: #64748b; white-space: nowrap; 
        }

        /* Colori Stati */
        .state-nuovo { background-color: #3b82f6; }        /* Blu */
        .state-lavorazione { background-color: #f59e0b; }  /* Amber */
        .state-risolto { background-color: #10b981; }      /* Smeraldo */
        .state-chiuso { background-color: #64748b; }       /* Slate */

        .timeline-cell { min-width: 45px; text-align: center; font-size: 10px; color: #94a3b8; border-right: 1px solid #f1f5f9; padding: 10px 0; font-weight: 600; }
        .timeline-cell.weekend { background-color: #f8fafc; color: #cbd5e1; }
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 30; pointer-events: none; }
        .today-line::after { content: 'OGGI'; position: absolute; top: 0; left: 4px; background: #ef4444; color: white; font-size: 8px; padding: 1px 4px; border-radius: 2px; }
        
        .sticky-col { position: sticky; left: 0; z-index: 40; background: white; border-right: 2px solid #f1f5f9; min-width: 280px; max-width: 280px; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-[1800px] mx-auto">
    <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Timeline <span class="text-blue-600">Ticket</span></h1>
            <p class="text-slate-500 text-sm font-medium">Visualizzazione Gantt basata sulle transizioni di stato</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex gap-4 mr-4 text-[10px] font-bold uppercase">
                <span class="flex items-center gap-1"><span class="w-3 h-3 state-nuovo rounded"></span> Nuovo</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 state-lavorazione rounded"></span> In Corso</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 state-risolto rounded"></span> Risolto</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 state-chiuso rounded"></span> Chiuso</span>
            </div>
            <button onclick="loadGantt()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 shadow-lg transition-all flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> Aggiorna Dati
            </button>
        </div>
    </header>

    <div class="gantt-container" id="gantt-viewport">
        <div id="timeline-header" class="flex border-b border-slate-200 bg-slate-50 sticky top-0 z-50"></div>
        <div id="gantt-content" class="relative"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG1kbG9pY25mcXlpeGx4d2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDgyODEsImV4cCI6MjA4NzU4NDI4MX0.EyPcvKFabIL_BX67S0MKLm4ccvHFr4Fiq3glt_iSJWg';
    
    const client = supabase.createClient(SB_URL, SB_KEY);
    const DAY_PX = 45; 
    const COL_WIDTH = 280;

    async function loadGantt() {
        const content = document.getElementById('gantt-content');
        content.innerHTML = '<div class="p-10 text-center text-slate-400 font-medium">Caricamento in corso...</div>';

        const { data: tickets, error } = await client
            .from('tickets') 
            .select('*')
            .order('datainserimento', { ascending: false });

        if (error) {
            content.innerHTML = `<div class="p-10 text-red-500">Errore: ${error.message}</div>`;
            return;
        }

        render(tickets);
    }

    function render(tickets) {
        const header = document.getElementById('timeline-header');
        const content = document.getElementById('gantt-content');
        
        if (!tickets || tickets.length === 0) {
            content.innerHTML = '<div class="p-10 text-center">Nessun ticket trovato nel database.</div>';
            return;
        }

        // Calcolo date limite
        const now = new Date();
        let minDate = new Date();
        minDate.setDate(minDate.getDate() - 7); // Default una settimana fa

        tickets.forEach(t => {
            if(t.datainserimento) {
                const d = new Date(t.datainserimento);
                if(d < minDate) minDate = new Date(d);
            }
        });

        minDate.setDate(minDate.getDate() - 2); 
        minDate.setHours(0,0,0,0);

        const maxDate = new Date(now);
        maxDate.setDate(maxDate.getDate() + 15); // Mostra 15 giorni nel futuro

        const totalDays = Math.ceil((maxDate - minDate) / (1000*60*60*24));

        // Render Timeline Header
        let headerHtml = `<div class="sticky-col h-full bg-slate-50 border-r border-slate-200"></div>`;
        for (let i = 0; i < totalDays; i++) {
            let d = new Date(minDate);
            d.setDate(d.getDate() + i);
            const isWeekend = d.getDay() === 0 || d.getDay() === 6;
            headerHtml += `<div class="timeline-cell ${isWeekend ? 'weekend' : ''}">${d.getDate()}/${d.getMonth()+1}</div>`;
        }
        header.innerHTML = headerHtml;
        header.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

        // Render Righe
        content.innerHTML = '';
        tickets.forEach(t => {
            const row = document.createElement('div');
            row.className = "flex border-b border-slate-100 row-height relative hover:bg-slate-50/50 transition-colors";
            row.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

            row.innerHTML = `
                <div class="sticky-col flex items-center px-6 border-r border-slate-100 z-20">
                    <div class="overflow-hidden">
                        <div class="font-bold text-xs text-slate-800 truncate">#${t.id} ${t.titolo || 'Senza Titolo'}</div>
                        <div class="flex items-center gap-2 mt-1">
                             <span class="text-[9px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 font-bold uppercase">${t.stato || 'Nuovo'}</span>
                             <span class="text-[9px] text-slate-400 font-medium">${t.datainserimento || ''}</span>
                        </div>
                    </div>
                </div>
                <div class="flex-grow relative overflow-hidden" id="bar-area-${t.id}"></div>
            `;
            content.appendChild(row);

            const area = document.getElementById(`bar-area-${t.id}`);
            
            // LOGICA SEGMENTI
            const dates = [];
            if (t.datainserimento) dates.push({ d: new Date(t.datainserimento), s: 'nuovo' });
            if (t.datainlavorazione) dates.push({ d: new Date(t.datainlavorazione), s: 'lavorazione' });
            if (t.datarisolto) dates.push({ d: new Date(t.datarisolto), s: 'risolto' });
            if (t.datachiuso) dates.push({ d: new Date(t.datachiuso), s: 'chiuso' });

            dates.sort((a, b) => a.d - b.d);

            if (dates.length > 0) {
                const firstStart = dates[0].d;
                const offsetDays = (firstStart - minDate) / (1000*60*60*24);
                
                const wrapper = document.createElement('div');
                wrapper.className = "bar-wrapper";
                wrapper.style.left = `${offsetDays * DAY_PX}px`;

                dates.forEach((curr, idx) => {
                    // La fine del segmento è la data successiva, oppure OGGI se è l'ultimo segmento e il ticket non è chiuso
                    let endDate;
                    if (idx < dates.length - 1) {
                        endDate = dates[idx+1].d;
                    } else {
                        // Se l'ultimo stato è 'chiuso', la barra finisce lì, altrimenti arriva a oggi
                        endDate = (curr.s === 'chiuso') ? curr.d : new Date();
                    }

                    const durationDays = Math.max(0.1, (endDate - curr.d) / (1000*60*60*24));
                    
                    const segment = document.createElement('div');
                    segment.className = `bar-segment state-${curr.s}`;
                    segment.style.width = `${durationDays * DAY_PX}px`;
                    segment.title = `Stato: ${curr.s}\nDal: ${curr.d.toLocaleDateString()}\nAl: ${endDate.toLocaleDateString()}`;
                    
                    // Etichetta stato sopra il primo segmento di quel tipo
                    segment.innerHTML = `<div class="bar-label">${curr.s}</div>`;
                    
                    wrapper.appendChild(segment);
                });
                area.appendChild(wrapper);
            }
        });

        // Linea Oggi
        const todayOffset = (new Date() - minDate) / (1000*60*60*24);
        const todayLine = document.createElement('div');
        todayLine.className = "today-line";
        todayLine.style.left = `${COL_WIDTH + (todayOffset * DAY_PX)}px`;
        content.appendChild(todayLine);
    }

    loadGantt();
</script>
</body>
</html>
