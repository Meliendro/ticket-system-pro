<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Advanced Life-Cycle | RIVIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .gantt-viewport { overflow-x: auto; background: #1e293b; border-radius: 20px; border: 1px solid #334155; }
        .row-height { height: 85px; border-bottom: 1px solid #334155; position: relative; }
        
        /* Container Barre */
        .master-bar { position: absolute; height: 42px; top: 22px; background: rgba(51, 65, 85, 0.4); border-radius: 8px; border: 1px dashed #475569; z-index: 1; }
        .segment-wrapper { position: absolute; height: 30px; top: 28px; display: flex; z-index: 10; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Segmenti Stati */
        .seg { height: 100%; position: relative; transition: width 0.3s; }
        .seg-nuovo { background: #3b82f6; }
        .seg-lavorazione { background: #f59e0b; }
        .seg-risolto { background: #10b981; }
        .seg-verificato { background: #8b5cf6; }
        .seg-accettato { background: #ec4899; }
        .seg-chiuso { background: #64748b; }
        .seg-rifiutato { background: #ef4444; }
        .seg-attesa { background: #06b6d4; }

        /* Marker Scadenza (i campi con la 's') */
        .deadline-marker { position: absolute; width: 2px; height: 50px; top: 18px; background: #ff4757; z-index: 20; }
        .deadline-marker::after { content: '🚩'; position: absolute; top: -15px; left: -7px; font-size: 10px; }

        .timeline-cell { min-width: 50px; text-align: center; font-size: 10px; color: #94a3b8; border-right: 1px solid #334155; padding: 12px 0; font-family: 'JetBrains Mono', monospace; }
        .sticky-col { position: sticky; left: 0; z-index: 50; background: #1e293b; border-right: 3px solid #3b82f6; min-width: 300px; max-width: 300px; }
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 100; pointer-events: none; }
        .today-line::before { content: 'NOW'; position: absolute; top: 0; left: -12px; background: #ef4444; color: white; font-size: 8px; font-weight: bold; padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-[1900px] mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-end mb-8 gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <div class="w-3 h-8 bg-blue-600 rounded-full"></div>
                <h1 class="text-3xl font-extrabold tracking-tighter">TICKET <span class="text-blue-500">ENGINE</span> GANTT</h1>
            </div>
            <p class="text-slate-400 font-medium">Monitoraggio scadenze dinamiche e cicli di stato</p>
        </div>
        <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700 flex gap-4">
             <button onclick="loadGantt()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg">
                <i class="fas fa-sync-alt mr-2"></i> UPDATE DATA
             </button>
        </div>
    </header>

    <div class="gantt-viewport shadow-2xl" id="viewport">
        <div id="timeline-header" class="flex bg-slate-800/50 backdrop-blur sticky top-0 z-[60]"></div>
        <div id="gantt-content" class="relative"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG1kbG9pY25mcXlpeGx4d2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDgyODEsImV4cCI6MjA4NzU4NDI4MX0.EyPcvKFabIL_BX67S0MKLm4ccvHFr4Fiq3glt_iSJWg';
    const client = supabase.createClient(SB_URL, SB_KEY);
    
    const DAY_PX = 50; 
    const COL_WIDTH = 300;

    async function loadGantt() {
        const content = document.getElementById('gantt-content');
        content.innerHTML = '<div class="p-20 text-center text-blue-400 animate-pulse font-bold">INTERROGANDO IL DATABASE...</div>';
        const { data: tickets, error } = await client.from('tickets').select('*');
        if (error) { content.innerHTML = `<div class="p-20 text-red-400">Error: ${error.message}</div>`; return; }
        render(tickets);
    }

    function render(tickets) {
        const header = document.getElementById('timeline-header');
        const content = document.getElementById('gantt-content');
        
        // Calcolo Range
        let minDate = new Date();
        minDate.setDate(minDate.getDate() - 5);
        tickets.forEach(t => {
            const d = t.data_inserimento ? new Date(t.data_inserimento) : new Date();
            if(d < minDate) minDate = new Date(d);
        });
        minDate.setHours(0,0,0,0);
        const maxDate = new Date(minDate);
        maxDate.setDate(maxDate.getDate() + 40); 
        const totalDays = Math.ceil((maxDate - minDate) / (86400000));

        // Header
        let hHtml = `<div class="sticky-col h-full border-r border-slate-700"></div>`;
        for (let i = 0; i < totalDays; i++) {
            let d = new Date(minDate); d.setDate(d.getDate() + i);
            hHtml += `<div class="timeline-cell">${d.getDate()}.${d.getMonth()+1}</div>`;
        }
        header.innerHTML = hHtml;
        header.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

        content.innerHTML = '';
        tickets.forEach(t => {
            const row = document.createElement('div');
            row.className = "flex row-height relative hover:bg-slate-800/30 transition-colors";
            row.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

            // Mappatura date stati
            const states = [];
            const mapping = [
                {k:'datanuovo', s:'nuovo', sk: 'datanuovos'},
                {k:'datainlavorazione', s:'lavorazione', sk: 'datainlavoraziones'},
                {k:'datarisolto', s:'risolto', sk: 'datarisoltos'},
                {k:'dataverificato', s:'verificato', sk: 'dataverificatos'},
                {k:'dataaccettato', s:'accettato', sk: 'dataaccettatos'},
                {k:'datachiuso', s:'chiuso', sk: 'datachiusos'},
                {k:'datarifiutato', s:'rifiutato', sk: 'datarifiutatos'},
                {k:'datainattesa', s:'attesa', sk: 'datainattesas'}
            ];

            mapping.forEach(m => {
                if(t[m.k]) states.push({ d: new Date(t[m.k]), s: m.s, d_limit: t[m.sk] ? new Date(t[m.sk]) : null });
            });
            states.sort((a,b) => a.d - b.d);

            row.innerHTML = `
                <div class="sticky-col flex items-center px-6 border-r border-slate-700 z-[40]">
                    <div class="overflow-hidden">
                        <div class="font-extrabold text-[12px] text-blue-400 truncate">#${t.id} - ${t.titolo || 'TASK'}</div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-tighter">${t.ambito || 'NO SCOPE'}</div>
                    </div>
                </div>
                <div class="flex-grow relative" id="track-${t.id}"></div>
            `;
            content.appendChild(row);
            const track = document.getElementById(`track-${t.id}`);

            // 1. Barra Master (Attività principale)
            if(t.inizioprevisto && t.fineprevista) {
                const sM = new Date(t.inizioprevisto);
                const eM = new Date(t.fineprevista);
                const offM = (sM - minDate) / 86400000;
                const durM = (eM - sM) / 86400000;
                const mBar = document.createElement('div');
                mBar.className = "master-bar";
                mBar.style.left = `${offM * DAY_PX}px`;
                mBar.style.width = `${durM * DAY_PX}px`;
                track.appendChild(mBar);
            }

            // 2. Segmenti di Stato
            if(states.length > 0) {
                const wrapper = document.createElement('div');
                wrapper.className = "segment-wrapper";
                wrapper.style.left = `${((states[0].d - minDate) / 86400000) * DAY_PX}px`;

                states.forEach((curr, idx) => {
                    let endD = (idx < states.length - 1) ? states[idx+1].d : (curr.s === 'chiuso' ? curr.d : new Date());
                    let dur = Math.max(0.1, (endD - curr.d) / 86400000);
                    
                    const seg = document.createElement('div');
                    seg.className = `seg seg-${curr.s}`;
                    seg.style.width = `${dur * DAY_PX}px`;
                    seg.title = `Stato: ${curr.s} | Fine: ${endD.toLocaleDateString()}`;
                    wrapper.appendChild(seg);

                    // Aggiungi Marker Scadenza Stato ('s')
                    if(curr.d_limit) {
                        const mLimit = document.createElement('div');
                        mLimit.className = "deadline-marker";
                        mLimit.style.left = `${((curr.d_limit - minDate) / 86400000) * DAY_PX}px`;
                        track.appendChild(mLimit);
                    }
                });
                track.appendChild(wrapper);
            }
        });

        // Today Line
        const tLine = document.createElement('div');
        tLine.className = "today-line";
        tLine.style.left = `${COL_WIDTH + ((new Date() - minDate) / 86400000) * DAY_PX}px`;
        content.appendChild(tLine);
    }
    loadGantt();
</script>
</body>
</html>
