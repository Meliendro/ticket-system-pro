<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Gantt System | Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        .gantt-viewport { overflow-x: auto; background: #1e293b; border-radius: 24px; border: 1px solid #334155; height: 650px; scroll-behavior: smooth; position: relative; }
        .row-height { min-height: 125px; border-bottom: 1px solid #334155; position: relative; display: flex; align-items: center; }
        
        .track-container { position: relative; flex-grow: 1; height: 95px; }
        
        .baseline-ticket {
            position: absolute;
            height: 8px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            top: 40px; 
            z-index: 5;
            pointer-events: none;
            border: 1px solid white;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .seg-bar { 
            position: absolute; height: 26px; border-radius: 6px; z-index: 20; cursor: help;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
            padding: 0 10px; font-size: 9px; font-weight: 800; text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        /* Tooltip / Disclaimer */
        .seg-bar::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 400;
            text-transform: none;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            pointer-events: none;
            border: 1px solid #475569;
        }
        .seg-bar:hover::after {
            opacity: 1;
            visibility: visible;
        }

        .seg-bar:hover { transform: translateY(-2px); z-index: 500; outline: 2px solid white; }

        .pos-0 { top: 4px; } .pos-1 { top: 31px; } .pos-2 { top: 58px; }

        .delay-fill {
            background: repeating-linear-gradient(45deg, #ef4444, #ef4444 12px, #991b1b 12px, #991b1b 24px);
            border: 1px solid #f87171; animation: pulse-red 2s infinite; z-index: 30;
        }

        @keyframes pulse-red { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

        @keyframes alert-row {
            0%, 100% { background: #1e293b; }
            50% { background: #450a0a; }
        }
        .ticket-delayed { animation: alert-row 3s infinite ease-in-out; border-right: 4px solid #ef4444 !important; }

        .st-nuovo { background: #3b82f6; } .st-lavorazione { background: #f59e0b; }
        .st-risolto { background: #10b981; } .st-verificato { background: #8b5cf6; }
        .st-accettato { background: #ec4899; } .st-chiuso { background: #64748b; }

        .timeline-cell { min-width: 50px; text-align: center; font-size: 10px; color: #64748b; border-right: 1px solid #334155; padding: 14px 0; font-family: 'JetBrains Mono', monospace; }
        
        .sticky-col { 
            position: sticky; 
            left: 0; 
            z-index: 100; 
            background: #1e293b; 
            border-right: 4px solid #3b82f6; 
            min-width: 250px; 
            max-width: 250px;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); 
        }
        
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 150; pointer-events: none; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 24px; min-height: 200px; }
    </style>
</head>
<body class="p-8" onload="loadGantt()">

<div class="max-w-[1900px] mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
        <div class="stat-card flex flex-col justify-center items-center border-l-8 border-red-600 shadow-xl">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">SLA Superati</h3>
            <span id="delay-count" class="text-6xl font-black text-white mt-2">0</span>
        </div>
        <div class="stat-card flex flex-col items-center justify-between">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Avanzamento Globale</h3>
            <div class="relative w-full h-36 flex justify-center items-center">
                <canvas id="stateChart"></canvas>
            </div>
        </div>
        <div class="stat-card flex flex-col justify-center border-l-8 border-blue-600 shadow-xl px-10">
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">PROJECT <span class="text-blue-500">CONTROL HUB</span></h1>
            <div class="flex gap-3 mt-6">
                <button onclick="loadGantt()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black transition-all text-[10px] uppercase shadow-lg flex items-center justify-center">
                    <i class="fas fa-sync-alt mr-2 text-xs"></i>Aggiorna
                </button>
                <button onclick="window.location.href='ticket_table.html'" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-4 rounded-2xl font-black transition-all text-[10px] uppercase shadow-lg flex items-center justify-center">
                    <i class="fas fa-home mr-2 text-xs"></i>Menu
                </button>
            </div>
        </div>
    </div>

    <div class="gantt-viewport shadow-2xl" id="viewport">
        <div id="timeline-header" class="flex bg-slate-800/95 backdrop-blur-md sticky top-0 z-[110]"></div>
        <div id="gantt-content" class="relative"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG1kbG9pY25mcXlpeGx4d2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDgyODEsImV4cCI6MjA4NzU4NDI4MX0.EyPcvKFabIL_BX67S0MKLm4ccvHFr4Fiq3glt_iSJWg';
    const client = supabase.createClient(SB_URL, SB_KEY);
    
    const DAY_PX = 50; 
    const COL_WIDTH = 250;
    let myChart = null;
    let globalMinDate = new Date();

    function formatDate(date) {
        return date.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    async function loadGantt() {
        try {
            const { data: tickets, error } = await client.from('tickets').select('*');
            if (error) throw error;
            
            if (tickets && tickets.length > 0) {
                tickets.sort((a, b) => b.id - a.id);

                let earliest = new Date();
                tickets.forEach(t => {
                    if (t.data_inserimento) {
                        const d = new Date(t.data_inserimento);
                        if (d < earliest) earliest = d;
                    }
                });
                earliest.setDate(earliest.getDate() - 5);
                earliest.setHours(0,0,0,0);
                globalMinDate = earliest;
            }

            render(tickets);
            scrollToToday();
        } catch (err) {
            console.error("Errore:", err);
        }
    }

    function scrollToToday() {
        const viewport = document.getElementById('viewport');
        const now = new Date();
        const daysFromMin = (now - globalMinDate) / 86400000;
        const scrollPos = (daysFromMin * DAY_PX) - (viewport.clientWidth / 2) + COL_WIDTH;
        viewport.scrollLeft = scrollPos;
    }

    function render(tickets) {
        const header = document.getElementById('timeline-header');
        const content = document.getElementById('gantt-content');
        const now = new Date();
        let totalDelayCounter = 0;
        let stateCounts = { nuovo: 0, lavorazione: 0, risolto: 0, verificato: 0, accettato: 0, chiuso: 0 };
        
        const totalDays = 150; 
        
        let hHtml = `<div class="sticky-col h-full border-r border-slate-700"></div>`;
        for (let i = 0; i < totalDays; i++) {
            let d = new Date(globalMinDate); d.setDate(d.getDate() + i);
            hHtml += `<div class="timeline-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
        }
        header.innerHTML = hHtml;
        header.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

        content.innerHTML = '';
        tickets.forEach(t => {
            let isTicketDelayed = false;
            const row = document.createElement('div');
            row.className = "flex row-height relative hover:bg-slate-800/40 transition-colors";
            row.style.width = `${COL_WIDTH + (totalDays * DAY_PX)}px`;

            const trackId = `track-${t.id}`;
            const stickyId = `sticky-${t.id}`;

            row.innerHTML = `
                <div id="${stickyId}" class="sticky-col flex items-center px-8 border-r border-slate-700">
                    <div>
                        <div class="font-black text-blue-500 text-sm">#${t.id}</div>
                        <div class="font-bold text-white text-[11px] uppercase truncate w-44" title="${t.titolo}">${t.titolo || 'N/A'}</div>
                        <div id="status-tag-${t.id}" class="text-[9px] font-bold mt-1 opacity-60"></div>
                    </div>
                </div>
                <div class="track-container" id="${trackId}"></div>
            `;
            content.appendChild(row);

            const track = document.getElementById(trackId);
            const stickyCol = document.getElementById(stickyId);
            const dStart = t.data_inserimento ? new Date(t.data_inserimento) : new Date();
            const dEnd = t.datachiuso ? new Date(t.datachiuso) : now;
            
            const baseLine = document.createElement('div');
            baseLine.className = "baseline-ticket";
            baseLine.style.left = `${((dStart - globalMinDate)/86400000)*DAY_PX}px`;
            baseLine.style.width = `${Math.max(30, ((dEnd - dStart)/86400000)*DAY_PX)}px`;
            track.appendChild(baseLine);

            const mapping = [
                {start:'datanuovo', end:'datanuovos', label:'Nuovo', class:'st-nuovo', key:'nuovo'},
                {start:'datainlavorazione', end:'datainlavoraziones', label:'Lavorazione', class:'st-lavorazione', key:'lavorazione'},
                {start:'datarisolto', end:'datarisoltos', label:'Risolto', class:'st-risolto', key:'risolto'},
                {start:'dataverificato', end:'dataverificatos', label:'Verificato', class:'st-verificato', key:'verificato'},
                {start:'dataaccettato', end:'dataaccettatos', label:'Accettato', class:'st-accettato', key:'accettato'},
                {start:'datachiuso', end:'datachiusos', label:'Chiuso', class:'st-chiuso', key:'chiuso'}
            ];

            const activeStates = mapping.filter(m => t[m.start]).map(m => ({...m, d: new Date(t[m.start])}));
            activeStates.sort((a,b) => b.d - a.d);
            
            if(activeStates.length > 0) {
                stateCounts[activeStates[0].key]++;
                document.getElementById(`status-tag-${t.id}`).innerText = activeStates[0].label;
            }

            mapping.forEach((m, idx) => {
                if(t[m.start] && t[m.end]) {
                    const dS = new Date(t[m.start]), dE = new Date(t[m.end]);
                    
                    // Barra di stato principale
                    const bar = document.createElement('div');
                    bar.className = `seg-bar ${m.class} pos-${idx % 3}`;
                    bar.style.left = `${((dS - globalMinDate)/86400000)*DAY_PX}px`;
                    bar.style.width = `${((dE - dS)/86400000)*DAY_PX}px`;
                    bar.innerHTML = `<span>${m.label}</span>`;
                    bar.setAttribute('data-tooltip', `${m.label} | Dal: ${formatDate(dS)} Al: ${formatDate(dE)}`);
                    track.appendChild(bar);
                    
                    // Barra di ritardo (se applicabile)
                    if(m.start === (activeStates[0]?.start) && now > dE && !t.datachiuso) {
                        isTicketDelayed = true;
                        const dBar = document.createElement('div');
                        dBar.className = `seg-bar delay-fill pos-${idx % 3}`;
                        dBar.style.left = `${((dE - globalMinDate)/86400000)*DAY_PX}px`;
                        dBar.style.width = `${((now - dE)/86400000)*DAY_PX}px`;
                        dBar.setAttribute('data-tooltip', `RITARDO: Scadenza prevista il ${formatDate(dE)}`);
                        track.appendChild(dBar);
                    }
                }
            });

            if (isTicketDelayed) {
                totalDelayCounter++;
                stickyCol.classList.add('ticket-delayed');
            }
        });

        document.getElementById('delay-count').innerText = totalDelayCounter;
        updateChart(stateCounts);
        
        const tLine = document.createElement('div');
        tLine.className = "today-line";
        tLine.style.left = `${COL_WIDTH + ((now - globalMinDate)/86400000)*DAY_PX}px`;
        content.appendChild(tLine);
    }

    function updateChart(counts) {
        const ctx = document.getElementById('stateChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Nuovo', 'Lavorazione', 'Risolto', 'Verificato', 'Accettato', 'Chiuso'],
                datasets: [{
                    data: [counts.nuovo, counts.lavorazione, counts.risolto, counts.verificato, counts.accettato, counts.chiuso],
                    backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#ec4899', '#64748b'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { display: false } }, cutout: '80%', responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
