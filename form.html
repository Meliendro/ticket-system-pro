<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Ticket - Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f8fafd;
            --text-main: #333;
            --text-gray: #888;
            --accent-blue: #3b82f6;
            --info-bg: #ebf5ff;
            --border-color: #e2e8f0;
            --danger: #ef4444;
        }

        * { font-family: 'Century Gothic', sans-serif; box-sizing: border-box; }

        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }

        .header-top { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; border-bottom: 2px solid var(--accent-blue); padding-bottom: 15px;
        }

        .nav-arrows {
            display:flex;
            gap:10px;
            margin-right:15px;
        }

        .nav-btn {
            background:#3b82f6;
            color:white;
            border:none;
            padding:6px 10px;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        .header-left {
            display:flex;
            align-items:center;
        }

        .header-top h1 { font-size: 28px; margin: 0; }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .tkn-badge { background: #fff; border: 1px solid #ddd; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .user-badge { font-size: 12px; color: var(--text-gray); font-style: italic; }

        /* resto invariato */
    </style>
</head>
<body>

<div class="container">
    <div id="msg-annullato" class="annullato-warning">TICKET ANNULLATO - MODIFICA DISABILITATA</div>
    
    <div class="header-top">
        <div class="header-left">
            <div class="nav-arrows">
                <button class="nav-btn" onclick="prevRecord()">◀</button>
                <button class="nav-btn" onclick="nextRecord()">▶</button>
            </div>
            <h1 id="titolo-header">Caricamento...</h1>
        </div>

        <div class="header-right">
            <div class="tkn-badge">TKN: <span id="tkn-id">--</span></div>
            <div id="user-badge" class="user-badge">--</div>
        </div>
    </div>

    <!-- RESTO DEL FILE IDENTICO (non modificato) -->

<script>
    const SB_URL = 'https://tdpmdloicnfqyixlxweh.supabase.co'; 
    const SB_KEY = '...';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('id');

    let listaId = [];

    async function caricaListaId() {
        const { data } = await _supabase.from('tickets').select('id').order('id');
        if(data) listaId = data.map(r => r.id);
    }

    function prevRecord() {
        if(!editId) return;
        const idx = listaId.indexOf(parseInt(editId));
        if(idx > 0){
            window.location.href = "form.html?id=" + listaId[idx - 1];
        }
    }

    function nextRecord() {
        if(!editId) return;
        const idx = listaId.indexOf(parseInt(editId));
        if(idx < listaId.length - 1){
            window.location.href = "form.html?id=" + listaId[idx + 1];
        }
    }

    async function inizializza() {
        await caricaListaId();

        // resto invariato...
    }

    inizializza();
</script>

</body>
</html>
