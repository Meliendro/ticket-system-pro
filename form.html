<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Ticket - Editor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
    --bg-color: #f8fafd;
    --text-main: #333;
    --text-gray: #888;
    --accent-blue: #3b82f6;
    --info-bg: #ebf5ff;
    --border-color: #e2e8f0;
    --danger: #ef4444;
}
* { font-family: 'Century Gothic', sans-serif; box-sizing: border-box; }
body { background-color: var(--bg-color); padding:20px; }
.container { max-width:1000px; margin:auto; }

.footer-actions {
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:30px;
}

.btn {
    padding:12px 25px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    text-transform:uppercase;
}

.btn-save { background:#3b82f6; color:white; }
.btn-cancel { background:#cbd5e1; }
</style>
</head>

<body>

<div class="container">

<h1 id="titolo-header">Ticket</h1>
<div>TKN: <span id="tkn-id">--</span></div>

<form id="form-ticket">

<input type="hidden" id="ticket-id">

<label>Titolo</label>
<input type="text" id="titolo">

<label>Descrizione</label>
<textarea id="descrizione"></textarea>

<label>Attività Tecnica</label>
<textarea id="descrizioneattivita"></textarea>

<label>Stato</label>
<input id="stato-select">

<label>Priorità</label>
<input id="priorita-select">

<label>Tipo</label>
<input id="tipo-select">

<label>Ambito</label>
<input id="ambito-select">

<label>Menu</label>
<input id="menu-select">

<label>Incarico</label>
<input id="incarico">

<label>Inizio Previsto</label>
<input id="inizioprevisto">

<label>Fine Prevista</label>
<input id="fineprevista">

<label>Data Rilascio</label>
<input id="datarilascio">

<label>Data Inserimento</label>
<input id="data_inserimento">

<label>Log Tecnico</label>
<textarea id="logtecnico"></textarea>

<div class="footer-actions">
    <button type="button" class="btn btn-cancel" onclick="location.href='ticket_table.html'">Indietro</button>
    <button type="submit" class="btn btn-save">Salva</button>

    <!-- PDF -->
    <button type="button" class="btn" style="background:#0ea5e9;color:white;" onclick="generaPDFProfessionale()">
        📄 PDF
    </button>
</div>

</form>
</div>

<script>

function generaPDFProfessionale() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 15;

    function titolo(text) {
        doc.setFontSize(16);
        doc.setFont(undefined, "bold");
        doc.text(text, 10, y);
        y += 8;
    }

    function sezione(text) {
        doc.setFontSize(12);
        doc.setFont(undefined, "bold");
        doc.text(text, 10, y);
        y += 6;
        doc.line(10, y, 200, y);
        y += 6;
    }

    function riga(label, value) {
        doc.setFontSize(10);
        doc.setFont(undefined, "bold");
        doc.text(label + ":", 10, y);

        doc.setFont(undefined, "normal");
        doc.text(value || "-", 70, y);
        y += 6;
    }

    function testoLungo(label, value) {
        doc.setFont(undefined, "bold");
        doc.text(label + ":", 10, y);
        y += 5;

        doc.setFont(undefined, "normal");
        const lines = doc.splitTextToSize(value || "-", 180);
        doc.text(lines, 10, y);
        y += lines.length * 5 + 4;
    }

    titolo("REPORT TICKET");

    doc.setFontSize(10);
    doc.text("Generato il: " + new Date().toLocaleString(), 140, 10);

    sezione("Informazioni Generali");

    riga("ID Ticket", document.getElementById('tkn-id').innerText);
    riga("Titolo", document.getElementById('titolo').value);
    riga("Stato", document.getElementById('stato-select').value);
    riga("Priorità", document.getElementById('priorita-select').value);
    riga("Tipo", document.getElementById('tipo-select').value);
    riga("Ambito", document.getElementById('ambito-select').value);
    riga("Menu", document.getElementById('menu-select').value);

    sezione("Descrizione");
    testoLungo("Segnalazione", document.getElementById('descrizione').value);

    sezione("Gestione Operativa");

    riga("Incarico", document.getElementById('incarico').value);
    riga("Inizio Previsto", document.getElementById('inizioprevisto').value);
    riga("Fine Prevista", document.getElementById('fineprevista').value);
    riga("Data Rilascio", document.getElementById('datarilascio').value);

    testoLungo("Attività Tecnica", document.getElementById('descrizioneattivita').value);

    sezione("Log Tecnico");
    testoLungo("Storico", document.getElementById('logtecnico').value);

    doc.setFontSize(8);
    doc.text("Documento generato automaticamente", 10, 290);

    doc.save(`Ticket_${document.getElementById('tkn-id').innerText}.pdf`);
}

</script>

</body>
</html>
