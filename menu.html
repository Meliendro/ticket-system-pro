<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Menu Principale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Century Gothic', sans-serif; background-color: #f8fafd; }
        .card-hover:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-slate-800">Gestionale <span class="text-blue-600">Ticket</span></h1>
        <a href="login.html" class="text-sm text-red-600 hover:text-red-700 font-bold">Esci</a>
    </header>

    <main class="flex-grow flex justify-center items-center p-6">
        <div class="grid grid-cols-1 gap-6 w-full max-w-sm">
            
            <a href="ticket_table.html" class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition flex items-center gap-4 border border-slate-100 card-hover">
                <div class="bg-blue-100 text-blue-600 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-slate-900">Elenco Ticket</h3>
                    <p class="text-sm text-slate-500">Visualizzazione tabellare</p>
                </div>
            </a>

            <a href="gantt.html" class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition flex items-center gap-4 border border-slate-100 card-hover">
                <div class="bg-indigo-100 text-indigo-600 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-slate-900">Vista Gantt</h3>
                    <p class="text-sm text-slate-500">Timeline e analisi ritardi</p>
                </div>
            </a>

        </div>
    </main>

    <footer class="p-4 text-center text-slate-400 text-xs">
        Enterprise Ticket Management System v2.0
    </footer>
</body>
</html>
